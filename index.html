<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <title>Dashboard SASS</title>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="sidebar__logo">SASS</div>
            <nav class="sidebar__nav">
                <a href="#" class="sidebar__link sidebar__link--active">📊Visão Geral</a>
                <a href="#" class="sidebar__link">📈 Estatísticas</a>
                <a href="#" class="sidebar__link">👥 Usuários</a>
                <a href="#" class="sidebar__link">⚙️ Configurações</a>
            </nav>
        </aside>
        <main class="main">
            <header class="header">
                <h1 class="header__title">Visão Geral</h1>
                <div class="header__actions">
                    <button class="header__notification">🔔</button>
                    <div class="header__avatar">👤</div>
                </div>
            </header>
            <div class="content">
                <section class="metrics">
                    <div class="metric-card metric-card--revenue">
                        <div class="metric-card__title">
                            <p class="metric-card__label">Receita Total</p>
                            <span class="metric-card__icon">💰</span>
                        </div>
                        <h3 class="metric-card__value">R$ 45.231</h3>
                        <p class="metric-card__change">+ 12.5% vs mês anterior</p>
                    </div>
                    <div class="metric-card metric-card--users">
                        <div class="metric-card__title">
                            <p class="metric-card__label">Usuários Ativos</p>
                            <span class="metric-card__icon">👥</span>
                        </div>
                        <h3 class="metric-card__value">1234</h3>
                        <p class="metric-card__change">+ 8.2% esta semana</p>
                    </div>
                    <div class="metric-card metric-card--conversion">
                        <div class="metric-card__title">
                            <p class="metric-card__label">Conversão</p>
                            <span class="metric-card__icon">📈</span>
                        </div>
                        <h3 class="metric-card__value">3,8%</h3>
                        <p class="metric-card__change">+ 0.3% hoje</p>
                    </div>
                    <div class="metric-card metric-card--growth">
                        <div class="metric-card__title">
                            <p class="metric-card__label">Crescimento</p>
                            <span class="metric-card__icon">🚀</span>
                        </div>
                        <h3 class="metric-card__value">+ 24%</h3>
                        <p class="metric-card__change">vs ano passado</p>
                    </div>
                </section>
                <sections class="transactions-table"></sections>
            </div>
        </main>
    </div>
</body>
</html>
